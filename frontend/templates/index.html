<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Telco Customer Churn Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(120deg, #1f4037, #99f2c8);
      min-height: 100vh;
    }

    .card {
      border-radius: 15px;
    }

    .title {
      font-weight: 700;
    }

    #loadingSpinner {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-lg">
          <div class="card-body p-4">
            <h3 class="text-center mb-4 title">
              📊 Telco Customer Churn Prediction
            </h3>

            <form id="predictForm">
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label>Gender</label>
                  <select name="gender" class="form-control">
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Senior Citizen</label>
                  <select name="SeniorCitizen" class="form-control">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Partner</label>
                  <select name="Partner" class="form-control">
                    <option>Yes</option>
                    <option>No</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Dependents</label>
                  <select name="Dependents" class="form-control">
                    <option>Yes</option>
                    <option>No</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Tenure (Months)</label>
                  <input type="number" name="tenure" class="form-control" required />
                </div>

                <div class="col-md-4 mb-3">
                  <label>Phone Service</label>
                  <select name="PhoneService" class="form-control">
                    <option>Yes</option>
                    <option>No</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Multiple Lines</label>
                  <select name="MultipleLines" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No phone service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Internet Service</label>
                  <select name="InternetService" class="form-control">
                    <option>DSL</option>
                    <option>Fiber optic</option>
                    <option>No</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Online Security</label>
                  <select name="OnlineSecurity" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Online Backup</label>
                  <select name="OnlineBackup" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Device Protection</label>
                  <select name="DeviceProtection" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Tech Support</label>
                  <select name="TechSupport" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Streaming TV</label>
                  <select name="StreamingTV" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Streaming Movies</label>
                  <select name="StreamingMovies" class="form-control">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Contract</label>
                  <select name="Contract" class="form-control">
                    <option>Month-to-month</option>
                    <option>One year</option>
                    <option>Two year</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Paperless Billing</label>
                  <select name="PaperlessBilling" class="form-control">
                    <option>Yes</option>
                    <option>No</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Payment Method</label>
                  <select name="PaymentMethod" class="form-control">
                    <option>Electronic check</option>
                    <option>Mailed check</option>
                    <option>Bank transfer (automatic)</option>
                    <option>Credit card (automatic)</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label>Monthly Charges</label>
                  <input type="number" step="0.01" name="MonthlyCharges" class="form-control" required />
                </div>

                <div class="col-md-4 mb-3">
                  <label>Total Charges</label>
                  <input type="number" step="0.01" name="TotalCharges" class="form-control" required />
                </div>
              </div>

              <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5">
                  Predict Churn
                </button>
              </div>
            </form>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="text-center mt-4">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>

            <!-- Result Box -->
            <div id="resultBox" class="mt-4"></div>

            <div class="text-center mt-3">
              <a href="/history" class="btn btn-dark">View Prediction History</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document
      .getElementById("predictForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const spinner = document.getElementById("loadingSpinner");
        const resultBox = document.getElementById("resultBox");

        spinner.style.display = "block";
        resultBox.innerHTML = "";

        try {
          const response = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();

          if (result.error) {
            resultBox.innerHTML = `
            <div class="alert alert-warning text-center">
              <h5>⚠️ ${result.error}</h5>
            </div>`;
          } else if (result.prediction === "Customer Will Churn") {
            resultBox.innerHTML = `
            <div class="alert alert-danger text-center">
              <h4>🔴 ${result.prediction}</h4>
            </div>`;
          } else {
            resultBox.innerHTML = `
            <div class="alert alert-success text-center">
              <h4>🟢 ${result.prediction}</h4>
            </div>`;
          }
        } catch (err) {
          resultBox.innerHTML = `
          <div class="alert alert-danger text-center">
            <h5>❌ Could not reach the prediction service.</h5>
          </div>`;
        } finally {
          spinner.style.display = "none";
        }
      });
  </script>
</body>

</html>
