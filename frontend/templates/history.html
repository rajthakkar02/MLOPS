<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Prediction History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(120deg, #1f4037, #99f2c8);
      min-height: 100vh;
    }

    .card {
      border-radius: 15px;
    }

    .title {
      font-weight: 700;
    }

    #loadingSpinner {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container mt-5">
    <div class="card shadow-lg">
      <div class="card-body">
        <h3 class="text-center mb-4 title">📜 Prediction History</h3>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center my-4">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>

        <!-- Error Box -->
        <div id="errorBox"></div>

        <!-- Table -->
        <div id="tableContainer" style="display: none">
          <table class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Gender</th>
                <th>Senior Citizen</th>
                <th>Partner</th>
                <th>Dependents</th>
                <th>Tenure</th>
                <th>Internet Service</th>
                <th>Contract</th>
                <th>Monthly Charges</th>
                <th>Total Charges</th>
                <th>Prediction</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>

        <div class="text-center mt-3">
          <a href="/" class="btn btn-primary">Back to Prediction</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadHistory() {
      const spinner = document.getElementById("loadingSpinner");
      const errorBox = document.getElementById("errorBox");
      const tableContainer = document.getElementById("tableContainer");
      const tbody = document.getElementById("historyTableBody");

      spinner.style.display = "block";

      try {
        const response = await fetch("/api/history");
        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          errorBox.innerHTML = `
            <div class="alert alert-info text-center">No prediction history found.</div>`;
          return;
        }

        tbody.innerHTML = data
          .map(
            (row) => `
          <tr>
            <td>${row.id}</td>
            <td>${row.gender}</td>
            <td>${row.SeniorCitizen}</td>
            <td>${row.Partner}</td>
            <td>${row.Dependents}</td>
            <td>${row.tenure}</td>
            <td>${row.InternetService}</td>
            <td>${row.Contract}</td>
            <td>${row.MonthlyCharges}</td>
            <td>${row.TotalCharges}</td>
            <td>
              ${row.prediction === "Customer Will Churn"
                ? '<span class="badge bg-danger">Churn</span>'
                : '<span class="badge bg-success">Stay</span>'
              }
            </td>
            <td>${row.created_at}</td>
          </tr>
        `,
          )
          .join("");

        tableContainer.style.display = "block";
      } catch (err) {
        errorBox.innerHTML = `
          <div class="alert alert-danger text-center">
            ❌ Could not load history. Backend may be unavailable.
          </div>`;
      } finally {
        spinner.style.display = "none";
      }
    }

    loadHistory();
  </script>
</body>

</html>
